apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-secret
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
data:
  DB_USERNAME: {{ .Values.env.database.username | b64enc | quote }}
  DB_PASSWORD: {{ .Values.env.database.password | b64enc | quote }}