spring:
  datasource:
    url: jdbc:h2:mem:bmicalculator
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000